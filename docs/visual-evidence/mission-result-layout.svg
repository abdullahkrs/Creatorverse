<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1580" viewBox="0 0 1600 1580" role="img" aria-labelledby="title desc">
  <title id="title">Creatorverse mission-result responsive composition evidence</title>
  <desc id="desc">Equivalent layout evidence for the mission-result field receipt at 320, 390, 768, and 1440 pixel widths in English and Arabic. This is a source-aligned schematic, not a browser screenshot.</desc>
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #f5f7fb; }
    .canvas { fill: #0b0d12; }
    .surface { fill: #141821; stroke: #343b49; stroke-width: 2; }
    .raised { fill: #1b202b; stroke: #343b49; stroke-width: 1; }
    .action { fill: #f0d36a; }
    .action-text { fill: #171408; font-weight: 800; }
    .success { fill: #69d49a; }
    .muted { fill: #a8afbd; }
    .small { font-size: 14px; }
    .label { font-size: 16px; font-weight: 800; }
    .title { font-size: 25px; font-weight: 800; }
    .energy { font-size: 34px; font-weight: 900; }
    .frame-label { font-size: 18px; font-weight: 800; }
    .note { font-size: 15px; fill: #a8afbd; }
    .rail-base { fill: #343b49; }
    .rail-gain { fill: #69d49a; }
    .node { fill: #f0d36a; stroke: #0b0d12; stroke-width: 4; }
  </style>
  <rect class="canvas" width="1600" height="1580"/>
  <text x="60" y="58" font-size="30" font-weight="900">CV-MVP-003 · Mission result field receipt</text>
  <text class="note" x="60" y="88">Equivalent composition evidence generated from implemented markup and CSS rules — not a browser screenshot.</text>

  <g transform="translate(60 125)">
