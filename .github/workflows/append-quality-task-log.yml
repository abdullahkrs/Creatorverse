name: Append quality task log

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  append:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'chore/cv-quality-001'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Append factual entry once
        run: |
          if grep -q 'CV-QUALITY-001' TASK_LOG.md; then exit 0; fi
          cat >> TASK_LOG.md <<'EOF'

## 2026-07-18 — CV-QUALITY-001 repository quality pipeline

**Outcome:** Make pull requests reproducibly installable and independently verifiable through real browser, accessibility, localization, and exact Railway Preview gates.

### Completed

- Added and committed `package-lock.json`; CI build and browser jobs use `npm ci`.
- Added Playwright Chromium checks and real screenshot artifacts at 320, 390, 768, 1024, and 1440 widths in English LTR and Arabic RTL.
- Added axe WCAG A/AA checks, keyboard safety-flow coverage, minimum touch-target checks, horizontal-overflow checks, and reduced-motion validation.
- Added mission-result localization key parity and direct visible-copy bypass checks.
- Moved Railway Preview discovery and identity validation into a tested Node script that rejects Production and verifies one exact PR candidate.
- Documented permanent Production, Staging, and PR Environment roles.
- Assigned routine workflow-state recovery exclusively to Continuity Guard and added unchanged-head QA review markers.
- Updated Product Lead and QA scheduled instructions to prevent stage races and duplicate reviews.

### Validation

- Locked dependency installation and the full unit/localization/build gate pass in GitHub CI.
- Exact Railway Preview, malformed-path, post-request liveness, Playwright, axe, and artifact jobs are required on the final PR head before release.

### Next best task

Run independent QA on the final unchanged PR head; do not add a product feature to this infrastructure cycle.
EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TASK_LOG.md
          git commit -m "docs: record quality pipeline cycle"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
