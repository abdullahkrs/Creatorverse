name: Railway Health Verification

on:
  push:
    branches: [main]
  schedule:
    - cron: '40 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: write

concurrency:
  group: railway-production-identity-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      EXPECTED_SHA: ${{ github.sha }}
      GITHUB_TOKEN: ${{ github.token }}
      PRODUCTION_URL: https://creatorverse-app-production.up.railway.app
      STAGING_URL: https://creatorverse-app-staging.up.railway.app
      MAX_ATTEMPTS: 18
      RETRY_DELAY_MS: 20000
      HTTP_TIMEOUT_MS: 12000

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Verify and publish Railway release identity
        run: node scripts/verify-railway-release.mjs
