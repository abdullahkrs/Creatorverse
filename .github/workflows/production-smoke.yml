name: Production Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: creatorverse-production-smoke
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      PRODUCTION_URL: https://creatorverse-app-production.up.railway.app

    steps:
      - name: Wait for Railway and verify health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..24}; do
            code="$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' --max-time 15 "$PRODUCTION_URL/health" || true)"
            if [ "$code" = "200" ] && grep -q '"status":"ok"' /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "Health attempt $attempt/24 failed with HTTP $code"
            sleep 20
          done
          echo "Railway production did not become healthy"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Verify deployed commit
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 15 "$PRODUCTION_URL/version" -o /tmp/version.json
          cat /tmp/version.json
          node - <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('/tmp/version.json', 'utf8'));
          const expected = process.env.GITHUB_SHA;
          if (!version.commitSha || !expected.startsWith(version.commitSha) && !version.commitSha.startsWith(expected)) {
            console.error(`Production commit ${version.commitSha || '<missing>'} does not match ${expected}`);
            process.exit(1);
          }
          NODE
