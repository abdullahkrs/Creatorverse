name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read
  checks: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Unit, localization, Railway verifier, and build gates
        run: npm run check

  railway-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
      EXPECTED_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ github.token }}
      STAGING_URL: https://creatorverse-app-staging.up.railway.app
      PRODUCTION_URL: https://creatorverse-app-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
      - id: preview
        name: Select one exact Railway Preview candidate
        run: node scripts/verify-railway-preview.mjs
      - name: Verify malformed request and post-request identity on the same candidate
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
        run: |
          set -euo pipefail
          malformed_code="$(curl --request-target '/%' --silent --show-error --output /tmp/malformed.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL" || true)"
          if [ "$malformed_code" != "400" ] && [ "$malformed_code" != "502" ]; then
            echo "Unsafe malformed-path response: HTTP $malformed_code"
            cat /tmp/malformed.json 2>/dev/null || true
            exit 1
          fi
          curl --fail --silent --show-error "$PREVIEW_URL/health" | grep '"status":"ok"'
          curl --fail --silent --show-error "$PREVIEW_URL/version" -o /tmp/post-version.json
          EXPECTED_SHA="$EXPECTED_SHA" EXPECTED_REF="$EXPECTED_REF" node - <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('/tmp/post-version.json', 'utf8'));
          const sha = process.env.EXPECTED_SHA;
          if (!(version.commitSha === sha || version.commitSha?.startsWith(sha) || sha.startsWith(version.commitSha || ''))) process.exit(1);
          if (version.branch !== process.env.EXPECTED_REF || String(version.environment).toLowerCase() === 'production') process.exit(1);
          NODE

  browser-quality:
    if: github.event_name == 'pull_request'
    needs: railway-preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Resolve exact Preview URL again by identity
        id: preview
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
          EXPECTED_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}
          STAGING_URL: https://creatorverse-app-staging.up.railway.app
          PRODUCTION_URL: https://creatorverse-app-production.up.railway.app
        run: node scripts/verify-railway-preview.mjs
      - name: Playwright responsive and accessibility gates
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.preview_url }}
        run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-quality-${{ github.event.pull_request.head.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
