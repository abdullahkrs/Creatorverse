name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Test and build
        run: npm run check

  railway-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
      EXPECTED_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ github.token }}
      PRODUCTION_URL: https://creatorverse-app-production.up.railway.app

    steps:
      - name: Discover isolated Railway PR environment
        shell: bash
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/$GITHUB_REPOSITORY"
          auth_header="Authorization: Bearer $GITHUB_TOKEN"
          version_header="X-GitHub-Api-Version: 2022-11-28"
          production_host="${PRODUCTION_URL#https://}"
          production_host="${production_host#http://}"
          production_host="${production_host%%/*}"
          service_slug="${production_host%-production.up.railway.app}"

          for attempt in {1..30}; do
            deployments="$(curl --fail --silent --show-error \
              --header "$auth_header" \
              --header "$version_header" \
              "$api/deployments?sha=$EXPECTED_SHA&per_page=100" || printf '[]')"

            mapfile -t deployment_ids < <(
              jq -r --arg sha "$EXPECTED_SHA" --arg ref "$EXPECTED_REF" \
                '.[] | select(.sha == $sha or .ref == $ref) | .id' <<<"$deployments"
            )

            for deployment_id in "${deployment_ids[@]}"; do
              statuses="$(curl --fail --silent --show-error \
                --header "$auth_header" \
                --header "$version_header" \
                "$api/deployments/$deployment_id/statuses?per_page=100" || printf '[]')"

              successful_status="$(jq -c '
                [ .[] | select(.state == "success") ][0] // empty
              ' <<<"$statuses")"
              [ -n "$successful_status" ] || continue

              preview_environment="$(jq -r '.environment // ""' <<<"$successful_status")"
              environment_url="$(jq -r '.environment_url // ""' <<<"$successful_status")"
              target_url="$(jq -r '.target_url // ""' <<<"$successful_status")"
              log_url="$(jq -r '.log_url // ""' <<<"$successful_status")"

              environment_slug="${preview_environment%%/*}"
              environment_slug="$(tr '[:upper:] ' '[:lower:]-' <<<"$environment_slug" | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')"

              candidates=("$environment_url" "$target_url" "$log_url")
              if [ -n "$service_slug" ] && [ -n "$environment_slug" ]; then
                candidates+=("https://${service_slug}-${environment_slug}.up.railway.app")
                candidates+=("https://${environment_slug}-${service_slug}.up.railway.app")
              fi
              if [ -n "$service_slug" ]; then
                candidates+=("https://${service_slug}-pr-${PR_NUMBER}.up.railway.app")
              fi

              for candidate in "${candidates[@]}"; do
                candidate="${candidate%/}"
                [ -n "$candidate" ] || continue
                [[ "$candidate" == http://* || "$candidate" == https://* ]] || continue
                [ "$candidate" != "${PRODUCTION_URL%/}" ] || continue

                health_code="$(curl --silent --show-error --output /tmp/discovery-health.json --write-out '%{http_code}' --max-time 12 "$candidate/health" || true)"
                if [ "$health_code" = "200" ] && grep -q '"status":"ok"' /tmp/discovery-health.json; then
                  echo "PREVIEW_URL=$candidate" >> "$GITHUB_ENV"
                  echo "Railway PR environment: $preview_environment"
                  echo "Railway Preview: $candidate"
                  exit 0
                fi
              done
            done

            echo "Preview discovery attempt $attempt/30: waiting for a public isolated deployment of $EXPECTED_SHA"
            sleep 20
          done

          echo "No public isolated Railway PR Environment was found for $EXPECTED_SHA."
          echo "Ensure PR Environments are enabled and that the base Railway service uses a Railway-provided public domain so the temporary environment receives its own domain."
          exit 1

      - name: Verify Railway Preview health, version, and malformed-path handling
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            health_code="$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/health" || true)"
            version_code="$(curl --silent --show-error --output /tmp/version.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/version" || true)"

            if [ "$health_code" = "200" ] && [ "$version_code" = "200" ] && grep -q '"status":"ok"' /tmp/health.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('/tmp/version.json', 'utf8'));
          const expectedSha = process.env.EXPECTED_SHA;
          const expectedRef = process.env.EXPECTED_REF;
          const actualSha = version.commitSha || '';
          const environment = String(version.environment || '').toLowerCase();

          if (!(actualSha === expectedSha || actualSha.startsWith(expectedSha) || expectedSha.startsWith(actualSha))) {
            console.error(`Preview commit ${actualSha || '<missing>'} does not match ${expectedSha}`);
            process.exit(1);
          }
          if (environment === 'production') {
            console.error('Preview reports the production environment.');
            process.exit(1);
          }
          if (version.branch !== expectedRef) {
            console.error(`Preview branch ${version.branch || '<missing>'} does not match ${expectedRef}`);
            process.exit(1);
          }
          NODE
              then
                malformed_code="$(curl --path-as-is --silent --show-error --output /tmp/malformed.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/%" || true)"
                if [ "$malformed_code" != "400" ] || ! grep -q '"error":"MALFORMED_PATH"' /tmp/malformed.json; then
                  echo "Malformed-path regression failed with HTTP $malformed_code"
                  cat /tmp/malformed.json 2>/dev/null || true
                  exit 1
                fi

                echo "Health response:"
                cat /tmp/health.json
                echo
                echo "Version response:"
                cat /tmp/version.json
                echo
                echo "Malformed-path response:"
                cat /tmp/malformed.json
                echo
                exit 0
              fi
            fi

            echo "Preview verification attempt $attempt/12: health=$health_code version=$version_code"
            sleep 10
          done

          echo "Railway Preview did not become verifiable for $EXPECTED_SHA"
          cat /tmp/health.json 2>/dev/null || true
          echo
          cat /tmp/version.json 2>/dev/null || true
          exit 1
