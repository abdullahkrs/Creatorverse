name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read
  checks: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Test and build
        run: npm run check

  railway-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
      EXPECTED_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ github.token }}
      STAGING_URL: https://creatorverse-app-staging.up.railway.app
      PRODUCTION_URL: https://creatorverse-app-production.up.railway.app

    steps:
      - name: Discover isolated Railway preview
        shell: bash
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/$GITHUB_REPOSITORY"
          auth_header="Authorization: Bearer $GITHUB_TOKEN"
          version_header="X-GitHub-Api-Version: 2022-11-28"
          metadata_file="/tmp/railway-preview-metadata.txt"
          : > "$metadata_file"

          github_get() {
            curl --fail --silent --show-error \
              --header "$auth_header" \
              --header "$version_header" \
              --header "Accept: application/vnd.github+json" \
              "$1" || printf '{}'
          }

          verify_candidate() {
            local candidate="${1%/}"
            [ "$candidate" != "${PRODUCTION_URL%/}" ] || return 1

            local health_code version_code
            health_code="$(curl --silent --show-error --output /tmp/discovery-health.json --write-out '%{http_code}' --max-time 15 "$candidate/health" || true)"
            version_code="$(curl --silent --show-error --output /tmp/discovery-version.json --write-out '%{http_code}' --max-time 15 "$candidate/version" || true)"

            [ "$health_code" = "200" ] || return 1
            [ "$version_code" = "200" ] || return 1
            grep -q '"status":"ok"' /tmp/discovery-health.json || return 1

            PREVIEW_CANDIDATE="$candidate" node - <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('/tmp/discovery-version.json', 'utf8'));
          const expectedSha = process.env.EXPECTED_SHA;
          const expectedRef = process.env.EXPECTED_REF;
          const actualSha = String(version.commitSha || '');
          const environment = String(version.environment || '').toLowerCase();

          if (!(actualSha === expectedSha || actualSha.startsWith(expectedSha) || expectedSha.startsWith(actualSha))) process.exit(1);
          if (environment === 'production') process.exit(1);
          if (version.branch !== expectedRef) process.exit(1);
          NODE

            echo "PREVIEW_URL=$candidate" >> "$GITHUB_ENV"
            echo "Railway Preview: $candidate"
            return 0
          }

          for attempt in {1..30}; do
            # Prefer the dedicated staging service when it has deployed this PR's exact branch and commit.
            if verify_candidate "$STAGING_URL"; then
              exit 0
            fi

            : > "$metadata_file"
            deployments="$(github_get "$api/deployments?sha=$EXPECTED_SHA&per_page=100")"
            printf '%s\n' "$deployments" >> "$metadata_file"

            mapfile -t deployment_ids < <(
              jq -r --arg sha "$EXPECTED_SHA" --arg ref "$EXPECTED_REF" \
                '.[]? | select(.sha == $sha or .ref == $ref) | .id' <<<"$deployments"
            )

            for deployment_id in "${deployment_ids[@]}"; do
              github_get "$api/deployments/$deployment_id/statuses?per_page=100" >> "$metadata_file"
              printf '\n' >> "$metadata_file"
            done

            github_get "$api/commits/$EXPECTED_SHA/status" >> "$metadata_file"
            printf '\n' >> "$metadata_file"
            github_get "$api/commits/$EXPECTED_SHA/check-runs?per_page=100" >> "$metadata_file"
            printf '\n' >> "$metadata_file"
            github_get "$api/issues/$PR_NUMBER/comments?per_page=100" >> "$metadata_file"
            printf '\n' >> "$metadata_file"
            github_get "$api/pulls/$PR_NUMBER/reviews?per_page=100" >> "$metadata_file"
            printf '\n' >> "$metadata_file"
            github_get "$api/pulls/$PR_NUMBER/comments?per_page=100" >> "$metadata_file"
            printf '\n' >> "$metadata_file"

            mapfile -t railway_pages < <(
              grep -Eo 'https://railway\.com/[^"[:space:]<>]+' "$metadata_file" \
                | sed -E 's/[),.;]+$//' \
                | sort -u || true
            )
            for railway_page in "${railway_pages[@]}"; do
              curl --location --silent --show-error --max-time 15 "$railway_page" >> "$metadata_file" || true
              printf '\n' >> "$metadata_file"
            done

            mapfile -t candidates < <(
              grep -Eo 'https?://[A-Za-z0-9.-]+\.up\.railway\.app' "$metadata_file" \
                | sort -u || true
            )

            for candidate in "${candidates[@]}"; do
              if verify_candidate "$candidate"; then
                exit 0
              fi
            done

            echo "Preview discovery attempt $attempt/30: staging or discovered environments do not yet match $EXPECTED_REF@$EXPECTED_SHA"
            sleep 20
          done

          echo "No isolated Railway environment is publicly serving the PR branch and commit."
          echo "Configure the staging service to deploy $EXPECTED_REF and expose its Railway domain, or enable Railway PR Environments."
          exit 1

      - name: Verify Railway Preview health, version, and malformed-path resilience
        shell: bash
        run: |
          set -euo pipefail

          verify_version_identity() {
            local version_file="$1"
            node - "$version_file" <<'NODE'
          const fs = require('fs');
          const file = process.argv[2];
          const version = JSON.parse(fs.readFileSync(file, 'utf8'));
          const expectedSha = process.env.EXPECTED_SHA;
          const expectedRef = process.env.EXPECTED_REF;
          const actualSha = String(version.commitSha || '');
          const environment = String(version.environment || '').toLowerCase();

          if (!(actualSha === expectedSha || actualSha.startsWith(expectedSha) || expectedSha.startsWith(actualSha))) {
            console.error(`Preview commit ${actualSha || '<missing>'} does not match ${expectedSha}`);
            process.exit(1);
          }
          if (environment === 'production') {
            console.error('Preview reports the production environment.');
            process.exit(1);
          }
          if (version.branch !== expectedRef) {
            console.error(`Preview branch ${version.branch || '<missing>'} does not match ${expectedRef}`);
            process.exit(1);
          }
          NODE
          }

          for attempt in {1..12}; do
            health_code="$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/health" || true)"
            version_code="$(curl --silent --show-error --output /tmp/version.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/version" || true)"

            if [ "$health_code" = "200" ] && [ "$version_code" = "200" ] && grep -q '"status":"ok"' /tmp/health.json && verify_version_identity /tmp/version.json; then
              malformed_code="$(curl --request-target '/%' --silent --show-error --output /tmp/malformed.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL" || true)"
              if [ "$malformed_code" != "400" ]; then
                echo "Malformed-path request was not rejected with HTTP 400; received $malformed_code"
                cat /tmp/malformed.json 2>/dev/null || true
                exit 1
              fi

              # Railway's edge may reject a syntactically malformed URL before Node receives it.
              # Direct application tests still require the JSON MALFORMED_PATH contract. Here we
              # additionally prove that the public service remains healthy and on the reviewed head.
              post_health_code="$(curl --silent --show-error --output /tmp/post-health.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/health" || true)"
              post_version_code="$(curl --silent --show-error --output /tmp/post-version.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL/version" || true)"

              if [ "$post_health_code" != "200" ] || [ "$post_version_code" != "200" ] || ! grep -q '"status":"ok"' /tmp/post-health.json || ! verify_version_identity /tmp/post-version.json; then
                echo "Preview did not remain healthy and correctly identified after the malformed-path request."
                cat /tmp/post-health.json 2>/dev/null || true
                echo
                cat /tmp/post-version.json 2>/dev/null || true
                exit 1
              fi

              if grep -q '"error":"MALFORMED_PATH"' /tmp/malformed.json 2>/dev/null; then
                echo "Malformed path was rejected by the application."
              else
                echo "Malformed path was rejected by Railway before reaching the application; post-request liveness and identity checks passed."
              fi

              echo "Health response:"
              cat /tmp/health.json
              echo
              echo "Version response:"
              cat /tmp/version.json
              echo
              echo "Malformed-path response:"
              cat /tmp/malformed.json 2>/dev/null || true
              echo
              echo "Post-request health response:"
              cat /tmp/post-health.json
              echo
              exit 0
            fi

            echo "Preview verification attempt $attempt/12: health=$health_code version=$version_code"
            sleep 10
          done

          echo "Railway Preview did not become verifiable for $EXPECTED_SHA"
          cat /tmp/health.json 2>/dev/null || true
          echo
          cat /tmp/version.json 2>/dev/null || true
          exit 1
