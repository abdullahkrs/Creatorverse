name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read
  checks: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Verify browser proxy syntax
        run: npm run test:proxy-syntax
      - name: Verify shared invite round trip
        run: node --test --test-name-pattern='shared invite is exact' test/shared-mission.test.js
      - name: Verify hostile shared invite rejection
        run: node --test --test-name-pattern='shared invite rejects' test/shared-mission.test.js
      - name: Verify equal receipt derivation
        run: node --test --test-name-pattern='one completion derives' test/shared-mission.test.js
      - name: Verify independent creator imports
        run: node --test --test-name-pattern='each creator independently' test/shared-mission.test.js
      - name: Verify shared receipt binding failures
        run: node --test --test-name-pattern='wrong realm' test/shared-mission.test.js
      - name: Verify atomic shared receipt retry
        run: node --test --test-name-pattern='ledger storage failure' test/shared-mission.test.js
      - name: Verify hostile shared receipt rejection
        run: node --test --test-name-pattern='receipt codec rejects' test/shared-mission.test.js
      - name: Verify shared mission copy parity
        run: node --test --test-name-pattern='Arabic and English copy' test/shared-mission.test.js
      - name: Verify shared mission replay protection
        run: node --test test/shared-mission-replay.test.js
      - name: Run complete unit suite
        run: npm run test:unit
      - name: Verify localization parity
        run: npm run test:i18n
      - name: Build production bundle
        run: npm run build

  railway-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      preview_url: ${{ steps.preview.outputs.preview_url }}
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
      EXPECTED_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ github.token }}
      PRODUCTION_URL: https://creatorverse-app-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
      - id: preview
        name: Select one exact Railway Preview candidate
        run: node scripts/verify-railway-preview.mjs
      - name: Verify malformed request and post-request identity on the same candidate
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
        run: |
          set -euo pipefail
          malformed_code="$(curl --request-target '/%' --silent --show-error --output /tmp/malformed.json --write-out '%{http_code}' --max-time 15 "$PREVIEW_URL" || true)"
          if [ "$malformed_code" != "400" ] && [ "$malformed_code" != "502" ]; then
            echo "Unsafe malformed-path response: HTTP $malformed_code"
            cat /tmp/malformed.json 2>/dev/null || true
            exit 1
          fi
          node --input-type=module - <<'NODE'
          import { verifyCandidate } from './scripts/verify-railway-preview.mjs';
          const result = await verifyCandidate(process.env.PREVIEW_URL, {
            expectedSha: process.env.EXPECTED_SHA,
            expectedRef: process.env.EXPECTED_REF,
            productionUrl: process.env.PRODUCTION_URL,
            prNumber: process.env.PR_NUMBER,
          });
          console.log(`Post-request identity verified for ${result.version.branch}@${result.version.commitSha}`);
          NODE

  browser-quality:
    if: github.event_name == 'pull_request'
    needs: railway-preview
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Reverify the selected exact Preview candidate
        id: preview
        env:
          PREVIEW_URL: ${{ needs.railway-preview.outputs.preview_url }}
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
          EXPECTED_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PRODUCTION_URL: https://creatorverse-app-production.up.railway.app
        run: |
          node --input-type=module - <<'NODE'
          import { appendFile } from 'node:fs/promises';
          import { verifyCandidate } from './scripts/verify-railway-preview.mjs';

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
          const context = {
            expectedSha: process.env.EXPECTED_SHA,
            expectedRef: process.env.EXPECTED_REF,
            productionUrl: process.env.PRODUCTION_URL,
            prNumber: process.env.PR_NUMBER,
          };
          let lastError;
          for (let attempt = 1; attempt <= 12; attempt += 1) {
            try {
              const result = await verifyCandidate(process.env.PREVIEW_URL, context);
              await appendFile(process.env.GITHUB_OUTPUT, `preview_url=${result.base}\n`);
              console.log(`Browser candidate verified for ${result.version.branch}@${result.version.commitSha}`);
              process.exit(0);
            } catch (error) {
              lastError = error;
              console.log(`Exact Preview reverify attempt ${attempt}/12: ${error.message}`);
              if (attempt < 12) await sleep(5000);
            }
          }
          throw lastError;
          NODE
      - name: Playwright responsive, accessibility, and usability proxy gates
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.preview_url }}
          USABILITY_PROXY_URL: ${{ steps.preview.outputs.preview_url }}
          USABILITY_PROXY_SHA: ${{ github.event.pull_request.head.sha }}
          USABILITY_PROXY_REF: ${{ github.event.pull_request.head.ref }}
        run: npm run test:e2e
      - name: Verify exact-head usability proxy report integrity
        env:
          USABILITY_PROXY_URL: ${{ steps.preview.outputs.preview_url }}
          USABILITY_PROXY_SHA: ${{ github.event.pull_request.head.sha }}
          USABILITY_PROXY_REF: ${{ github.event.pull_request.head.ref }}
        run: node scripts/usability-proxy-report.mjs
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-quality-${{ github.event.pull_request.head.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
