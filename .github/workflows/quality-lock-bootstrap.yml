name: Quality lock bootstrap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/quality-lock-bootstrap.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/cv-quality-001
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
      - run: npm install --package-lock-only --ignore-scripts
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: lock quality dependencies"
          git push origin HEAD:chore/cv-quality-001
